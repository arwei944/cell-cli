name: Mutation Testing

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to test (e.g., cell-domain)'
        required: false
        default: 'cell-domain'
      file_filter:
        description: 'File filter glob (e.g., **/entropy.rs)'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always

jobs:
  mutation-test:
    name: Mutation Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "mutation-test"

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: List mutants
        run: |
          if [ -n "${{ github.event.inputs.package }}" ]; then
            PACKAGE_ARG="-p ${{ github.event.inputs.package }}"
          fi
          if [ -n "${{ github.event.inputs.file_filter }}" ]; then
            FILE_ARG="--file '${{ github.event.inputs.file_filter }}'"
          fi
          cargo mutants $PACKAGE_ARG $FILE_ARG --list

      - name: Run mutation tests
        run: |
          if [ -n "${{ github.event.inputs.package }}" ]; then
            PACKAGE_ARG="-p ${{ github.event.inputs.package }}"
          fi
          if [ -n "${{ github.event.inputs.file_filter }}" ]; then
            FILE_ARG="--file '${{ github.event.inputs.file_filter }}'"
          fi
          cargo mutants $PACKAGE_ARG $FILE_ARG --no-shuffle

      - name: Upload mutation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-results
          path: mutants.out/
