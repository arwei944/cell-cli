<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell 架构仪表盘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #475569;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .subtitle { color: #94a3b8; font-size: 14px; margin-top: 4px; }
        .refresh-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .refresh-btn:hover { background: #2563eb; }
        .container { padding: 24px; max-width: 1400px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }
        .card h2 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .progress-section { grid-column: 1 / -1; }
        .progress-bar {
            height: 24px;
            background: #334155;
            border-radius: 12px;
            overflow: hidden;
            margin: 12px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e, #16a34a);
            border-radius: 12px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 12px;
            font-weight: 600;
        }
        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #94a3b8;
        }
        .metric-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .metric-label { font-size: 13px; color: #94a3b8; }
        .entropy-score { font-size: 48px; font-weight: 700; }
        .entropy-grade { font-size: 18px; margin-top: 4px; }
        .grade-healthy { color: #22c55e; }
        .grade-notice { color: #3b82f6; }
        .grade-warning { color: #eab308; }
        .grade-danger { color: #f97316; }
        .grade-critical { color: #ef4444; }
        .dim-bar {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 12px;
        }
        .dim-label {
            width: 100px;
            font-size: 13px;
            color: #94a3b8;
            flex-shrink: 0;
        }
        .dim-bar-bg {
            flex: 1;
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
        }
        .dim-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s;
        }
        .dim-value { width: 50px; text-align: right; font-size: 13px; font-weight: 600; }
        .event-list { list-style: none; max-height: 300px; overflow-y: auto; }
        .event-item {
            padding: 10px 0;
            border-bottom: 1px solid #334155;
            font-size: 13px;
        }
        .event-item:last-child { border-bottom: none; }
        .event-time { color: #64748b; font-size: 12px; margin-bottom: 2px; }
        .event-type {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 6px;
        }
        .type-Start { background: #22c55e20; color: #22c55e; }
        .type-Decision { background: #a78bfa20; color: #a78bfa; }
        .type-Blocker { background: #ef444420; color: #ef4444; }
        .type-Complete { background: #3b82f620; color: #3b82f6; }
        .decision-item {
            padding: 10px 0;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            transition: background 0.2s;
        }
        .decision-item:hover { background: #33415550; }
        .decision-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
        .decision-meta { font-size: 12px; color: #64748b; }
        .risk-list { list-style: none; }
        .risk-item {
            padding: 8px 0;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .risk-icon { color: #ef4444; }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        .stat-item { text-align: center; }
        .stat-item .num { font-size: 24px; font-weight: 700; }
        .stat-item .label { font-size: 12px; color: #64748b; }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: #64748b;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .tab {
            padding: 8px 16px;
            background: #334155;
            border: none;
            color: #94a3b8;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .tab.active { background: #3b82f6; color: white; }
        .auto-refresh {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #94a3b8;
        }
        .auto-refresh input { cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>📊 Cell 架构仪表盘</h1>
            <div class="subtitle" id="projectName">加载中...</div>
        </div>
        <div style="display: flex; align-items: center; gap: 20px;">
            <label class="auto-refresh">
                <input type="checkbox" id="autoRefresh" checked> 自动刷新 (5s)
            </label>
            <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
        </div>
    </div>

    <div class="container" id="container">
        <div class="loading">
            <div class="spinner"></div>
        </div>
    </div>

    <script>
        let autoRefreshInterval = null;

        function getGradeClass(grade) {
            const map = {
                '健康': 'grade-healthy',
                '注意': 'grade-notice',
                '警告': 'grade-warning',
                '危险': 'grade-danger',
                '灾难': 'grade-critical'
            };
            return map[grade] || 'grade-notice';
        }

        function getDimColor(score) {
            if (score < 20) return '#22c55e';
            if (score < 40) return '#3b82f6';
            if (score < 60) return '#eab308';
            if (score < 80) return '#f97316';
            return '#ef4444';
        }

        function formatTime(iso) {
            const d = new Date(iso);
            return d.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        async function loadData() {
            try {
                const res = await fetch('/api/dashboard');
                if (res.status === 503) {
                    renderLoading();
                    return;
                }
                const data = await res.json();
                renderDashboard(data);
            } catch (e) {
                console.error('加载数据失败:', e);
                renderError(e.message);
            }
        }

        function renderLoading() {
            const container = document.getElementById('container');
            container.innerHTML = `
                <div style="text-align: center; padding: 80px 20px;">
                    <div class="spinner" style="margin: 0 auto 20px; width: 48px; height: 48px; border-width: 4px;"></div>
                    <h2 style="color: #cbd5e1; margin-bottom: 12px;">⏳ 正在初始化熵值计算...</h2>
                    <p style="color: #94a3b8; margin-bottom: 8px;">首次加载可能需要 1-3 分钟</p>
                    <p style="color: #64748b; font-size: 14px;">页面会自动刷新，熵值计算完成后将显示仪表盘</p>
                </div>
            `;
        }

        function renderError(msg) {
            const container = document.getElementById('container');
            container.innerHTML = `
                <div style="text-align: center; padding: 60px 20px;">
                    <h2 style="color: #ef4444; margin-bottom: 12px;">❌ 加载失败</h2>
                    <p style="color: #94a3b8;">${msg}</p>
                    <button class="refresh-btn" style="margin-top: 20px;" onclick="loadData()">重试</button>
                </div>
            `;
        }

        function refreshEntropy() {
            fetch('/api/entropy/refresh')
                .then(r => r.json())
                .then(d => {
                    alert(d.message || '刷新已启动');
                })
                .catch(e => {
                    alert('刷新失败: ' + e.message);
                });
        }

        function renderDashboard(data) {
            document.getElementById('projectName').textContent = '项目: ' + data.project_name;

            const container = document.getElementById('container');
            container.innerHTML = `
                <div class="grid">
                    <div class="card progress-section">
                        <h2>🎯 总体进度</h2>
                        <div class="progress-meta">
                            <span>${data.current_phase} · 当前任务: ${data.current_task || '无'}</span>
                            <span>${data.completed_tasks} / ${data.total_tasks} 任务</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${data.overall_progress}%">
                                ${data.overall_progress.toFixed(1)}%
                            </div>
                        </div>
                        <div class="stats-row">
                            <div class="stat-item">
                                <div class="num">${data.completed_tasks}</div>
                                <div class="label">已完成任务</div>
                            </div>
                            <div class="stat-item">
                                <div class="num" style="color: ${data.active_blockers > 0 ? '#ef4444' : '#22c55e'}">${data.active_blockers}</div>
                                <div class="label">活跃阻塞</div>
                            </div>
                            <div class="stat-item">
                                <div class="num">${data.total_lines.toLocaleString()}</div>
                                <div class="label">代码行数</div>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h2>📈 熵值总览</h2>
                        <div class="entropy-score ${getGradeClass(data.entropy_grade)}">${data.entropy_score.toFixed(1)}</div>
                        <div class="entropy-grade ${getGradeClass(data.entropy_grade)}">${data.entropy_grade}</div>
                        <div style="margin-top: 20px;">
                            <div class="dim-bar">
                                <span class="dim-label">🏗️ 结构熵</span>
                                <div class="dim-bar-bg">
                                    <div class="dim-bar-fill" style="width: ${data.dimensions.structural}%; background: ${getDimColor(data.dimensions.structural)}"></div>
                                </div>
                                <span class="dim-value">${data.dimensions.structural.toFixed(1)}%</span>
                            </div>
                            <div class="dim-bar">
                                <span class="dim-label">🔄 复杂度</span>
                                <div class="dim-bar-bg">
                                    <div class="dim-bar-fill" style="width: ${data.dimensions.complexity}%; background: ${getDimColor(data.dimensions.complexity)}"></div>
                                </div>
                                <span class="dim-value">${data.dimensions.complexity.toFixed(1)}%</span>
                            </div>
                            <div class="dim-bar">
                                <span class="dim-label">🔗 耦合熵</span>
                                <div class="dim-bar-bg">
                                    <div class="dim-bar-fill" style="width: ${data.dimensions.coupling}%; background: ${getDimColor(data.dimensions.coupling)}"></div>
                                </div>
                                <span class="dim-value">${data.dimensions.coupling.toFixed(1)}%</span>
                            </div>
                            <div class="dim-bar">
                                <span class="dim-label">📝 命名熵</span>
                                <div class="dim-bar-bg">
                                    <div class="dim-bar-fill" style="width: ${data.dimensions.naming}%; background: ${getDimColor(data.dimensions.naming)}"></div>
                                </div>
                                <span class="dim-value">${data.dimensions.naming.toFixed(1)}%</span>
                            </div>
                            <div class="dim-bar">
                                <span class="dim-label">🧪 测试熵</span>
                                <div class="dim-bar-bg">
                                    <div class="dim-bar-fill" style="width: ${data.dimensions.test}%; background: ${getDimColor(data.dimensions.test)}"></div>
                                </div>
                                <span class="dim-value">${data.dimensions.test.toFixed(1)}%</span>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h2>⚠️ 高风险文件 (${data.high_risk_files.length})</h2>
                        <ul class="risk-list">
                            ${data.high_risk_files.slice(0, 8).map(f => `
                                <li class="risk-item">
                                    <span class="risk-icon">🔴</span>
                                    <span style="font-family: monospace; font-size: 12px;">${f}</span>
                                </li>
                            `).join('')}
                            ${data.high_risk_files.length === 0 ? '<li style="color: #22c55e; padding: 20px 0; text-align: center;">✅ 暂无高风险文件</li>' : ''}
                        </ul>
                    </div>

                    <div class="card">
                        <h2>📋 活动时间线</h2>
                        <ul class="event-list">
                            ${data.recent_events.map(e => `
                                <li class="event-item">
                                    <div class="event-time">${formatTime(e.timestamp)}</div>
                                    <div>
                                        <span class="event-type type-${e.event_type}">${e.event_type}</span>
                                        ${e.message}
                                    </div>
                                </li>
                            `).join('')}
                            ${data.recent_events.length === 0 ? '<li style="color: #64748b; padding: 20px 0; text-align: center;">暂无活动记录</li>' : ''}
                        </ul>
                    </div>

                    <div class="card">
                        <h2>💡 决策记录 (${data.decisions_count})</h2>
                        <div style="margin-bottom: 16px;">
                            <div class="stats-row">
                                <div class="stat-item">
                                    <div class="num" style="color: #22c55e; font-size: 20px;">${data.decisions_count}</div>
                                    <div class="label">总决策</div>
                                </div>
                                <div class="stat-item">
                                    <div class="num" style="color: #3b82f6; font-size: 20px;">${data.issues_count}</div>
                                    <div class="label">问题</div>
                                </div>
                                <div class="stat-item">
                                    <div class="num" style="color: #a78bfa; font-size: 20px;">${data.improvements_count}</div>
                                    <div class="label">改进</div>
                                </div>
                            </div>
                        </div>
                        ${data.recent_decisions.map(d => `
                            <div class="decision-item">
                                <div class="decision-title">${d.title}</div>
                                <div class="decision-meta">${d.category} · ${d.status} · ${formatTime(d.made_at)}</div>
                            </div>
                        `).join('')}
                        ${data.recent_decisions.length === 0 ? '<div style="color: #64748b; padding: 20px 0; text-align: center;">暂无决策记录</div>' : ''}
                    </div>

                    <div class="card">
                        <h2>⚡ 性能指标</h2>
                        <div class="stats-row">
                            <div class="stat-item">
                                <div class="num" style="font-size: 20px;">${data.metrics.command_count}</div>
                                <div class="label">命令执行次数</div>
                            </div>
                            <div class="stat-item">
                                <div class="num" style="color: #22c55e; font-size: 20px;">${data.metrics.success_rate.toFixed(1)}%</div>
                                <div class="label">成功率</div>
                            </div>
                            <div class="stat-item">
                                <div class="num" style="font-size: 20px;">${data.metrics.avg_command_time_ms.toFixed(0)}ms</div>
                                <div class="label">平均耗时</div>
                            </div>
                        </div>
                        <div class="stats-row">
                            <div class="stat-item">
                                <div class="num" style="color: #60a5fa; font-size: 20px;">${data.metrics.accuracy_score.toFixed(1)}</div>
                                <div class="label">准确度</div>
                            </div>
                            <div class="stat-item">
                                <div class="num" style="color: #a78bfa; font-size: 20px;">${data.metrics.efficiency_score.toFixed(1)}</div>
                                <div class="label">效率</div>
                            </div>
                            <div class="stat-item">
                                <div class="num" style="font-size: 20px;">${data.file_count}</div>
                                <div class="label">文件数</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        document.getElementById('autoRefresh').addEventListener('change', function() {
            if (this.checked) {
                autoRefreshInterval = setInterval(loadData, 5000);
            } else {
                clearInterval(autoRefreshInterval);
            }
        });

        loadData();
        autoRefreshInterval = setInterval(loadData, 5000);
    </script>
</body>
</html>
